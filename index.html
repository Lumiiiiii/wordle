<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordle Clone Italiano</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #121213;
            --color-bg-grad: radial-gradient(circle at 50% 0%, #202124, #121213 100%);
            --color-text: #ffffff;
            --color-correct: #538d4e;
            --color-correct-glow: rgba(83, 141, 78, 0.4);
            --color-present: #b59f3b;
            --color-present-glow: rgba(181, 159, 59, 0.4);
            --color-absent: #3a3a3c;
            --color-key-bg: #818384;
            --color-border: #3a3a3c;
            --color-border-active: #787c7e;
            --font-family: 'Outfit', 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            --radius-tile: 10px;
            --radius-key: 6px;
        }

        body {
            background: var(--color-bg-grad);
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* fallback */
            height: 100dvh;
            overflow: hidden;
            touch-action: pan-y;
        }

        header {
            width: 100%;
            padding: 12px 0;
            text-align: center;
            background: rgba(18, 18, 19, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 4px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Message Box Container */
        #message-container {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 90%;
        }

        .message {
            background-color: rgba(255,255,255,0.95);
            color: #121213;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            margin-bottom: 12px;
            opacity: 1;
            transition: opacity 0.5s ease-out, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            transform: translateY(0);
            pointer-events: auto;
            font-size: 1.05rem;
        }

        .message.fade-out {
            opacity: 0;
            transform: translateY(-20px);
        }

        /* Board */
        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 10px;
            box-sizing: border-box;
            width: 100%;
            overflow: hidden;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            padding: 10px;
            box-sizing: border-box;
            width: 100%;
            max-width: min(380px, 100%, calc((100dvh - 280px) * 5 / 6));
            aspect-ratio: 5 / 6;
            margin: 0 auto;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .tile {
            width: 100%;
            height: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 700;
            vertical-align: middle;
            box-sizing: border-box;
            color: var(--color-text);
            text-transform: uppercase;
            border: 2px solid var(--color-border);
            user-select: none;
            border-radius: var(--radius-tile);
            background-color: transparent;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .tile[data-state="tbd"] {
            border: 2px solid var(--color-border);
        }

        .tile[data-state="active"] {
            border-color: var(--color-border-active);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(120, 124, 126, 0.25);
            animation: pop 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Flip Animation */
        @keyframes flip-in {
            0% { transform: rotateX(0deg) scale(1.02); }
            50% { transform: rotateX(-90deg) scale(1.05); }
            100% { transform: rotateX(-90deg) scale(1.05); }
        }

        @keyframes flip-out-correct {
            0% { transform: rotateX(-90deg) scale(1.05); background-color: var(--color-correct); border-color: transparent; }
            100% { transform: rotateX(0deg) scale(1); background-color: var(--color-correct); border-color: transparent; box-shadow: 0 0 15px var(--color-correct-glow); }
        }

        @keyframes flip-out-present {
            0% { transform: rotateX(-90deg) scale(1.05); background-color: var(--color-present); border-color: transparent; }
            100% { transform: rotateX(0deg) scale(1); background-color: var(--color-present); border-color: transparent; box-shadow: 0 0 15px var(--color-present-glow); }
        }

        @keyframes flip-out-absent {
            0% { transform: rotateX(-90deg) scale(1.05); background-color: var(--color-absent); border-color: transparent; }
            100% { transform: rotateX(0deg) scale(1); background-color: var(--color-absent); border-color: transparent; }
        }

        /* Keyboard */
        #keyboard {
            width: 100%;
            max-width: 500px;
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: max(10px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .key {
            font-family: inherit;
            font-weight: 600;
            border: 0;
            padding: 0;
            margin: 0;
            height: clamp(45px, 7vh, 60px);
            border-radius: var(--radius-key);
            cursor: pointer;
            user-select: none;
            background-color: var(--color-key-bg);
            color: var(--color-text);
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            font-size: clamp(0.9rem, 4vw, 1.25rem);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 3px 0 0 rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .key::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .key:active::after {
            opacity: 1;
        }

        .key:active {
            transform: translateY(3px) scale(0.96);
            box-shadow: 0 0px 0 0 rgba(0,0,0,0.3);
        }

        .key.large {
            flex: 1.5;
            font-size: clamp(0.7rem, 3.2vw, 1rem);
        }

        /* Post-flip states for tiles and keys */
        .tile.correct, .key.correct {
            background-color: var(--color-correct) !important;
            border-color: transparent !important;
            color: white;
            box-shadow: 0 0 15px var(--color-correct-glow);
        }

        .tile.present, .key.present {
            background-color: var(--color-present) !important;
            border-color: transparent !important;
            color: white;
            box-shadow: 0 0 15px var(--color-present-glow);
        }

        .tile.absent, .key.absent {
            background-color: var(--color-absent) !important;
            border-color: transparent !important;
            color: white;
            box-shadow: none !important;
        }
        
        .key.correct, .key.present, .key.absent {
            box-shadow: 0 3px 0 0 rgba(0, 0, 0, 0.4) !important;
        }

        /* Pop animation for letters appearing */
        @keyframes pop {
            0% { transform: scale(0.85); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        .tile.pop {
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Victory Jump Animation */
        @keyframes jump {
            0%, 20% { transform: translateY(0); }
            40% { transform: translateY(-25px) scale(1.05); }
            50% { transform: translateY(5px) scale(0.95); }
            60% { transform: translateY(-12px) scale(1.02); }
            80% { transform: translateY(3px) scale(0.98); }
            100% { transform: translateY(0); }
        }

        .tile.jump {
            animation: jump 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Modal Overlay */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        #modal-content {
            background-color: #1a1b1d;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #modal-title {
            margin-top: 0;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #modal-subtitle {
            color: #aaaaaa;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px 10px;
        }
        
        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-num {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
        }
        
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888888;
            letter-spacing: 1.5px;
            margin-top: 6px;
        }
        
        #mini-board-container {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mini-board-line {
            line-height: 1.1;
            letter-spacing: 4px;
            margin-bottom: 4px;
            font-size: 1.4rem;
        }
        
        button#play-again {
            background: linear-gradient(135deg, var(--color-correct), #3ea735);
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(83, 141, 78, 0.4);
            letter-spacing: 1px;
        }
        
        button#play-again:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(83, 141, 78, 0.5);
        }
        
        button#play-again:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(83, 141, 78, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>WORDLE IT</h1>
    </header>

    <div id="message-container"></div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row">
            <div style="flex: 0.5;"></div>
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
            <div style="flex: 0.5;"></div>
        </div>
        <div class="keyboard-row">
            <button class="key large" data-key="ENTER">INVIO</button>
            <button class="key" data-key="Z">Z</button>
            <button class="key" data-key="X">X</button>
            <button class="key" data-key="C">C</button>
            <button class="key" data-key="V">V</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="N">N</button>
            <button class="key" data-key="M">M</button>
            <button class="key large" data-key="BACKSPACE">⌫</button>
        </div>
    </div>

    <!-- Modal for Endgame screen -->
    <div id="modal-overlay">
        <div id="modal-content">
            <h2 id="modal-title">Risultati</h2>
            <div id="modal-subtitle"></div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-num" id="stat-played">0</div>
                    <div class="stat-label">Giocate</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-won">0</div>
                    <div class="stat-label">Vinte</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-winpct">0%</div>
                    <div class="stat-label">Win %</div>
                </div>
            </div>
            
            <div id="mini-board-container"></div>
            
            <button id="play-again" onclick="resetGame()">GIOCA ANCORA</button>
        </div>
    </div>

    <script>
        let DICTIONARY = [];
        let TARGET_WORD = "";

        // Fetch dictionary from an external source (Napolux's list of Italian words)
        async function loadDictionary() {
            showMessage("Caricamento dizionario...", 0); // show indefinitely
            try {
                const response = await fetch("https://raw.githubusercontent.com/napolux/paroleitaliane/master/paroleitaliane/660000_parole_italiane.txt");
                if (!response.ok) throw new Error("Errore di rete");
                const text = await response.text();
                
                // Filter only 5-letter words with alphabetical characters
                DICTIONARY = text.split('\n')
                    .map(word => word.trim().toUpperCase())
                    .filter(word => word.length === 5 && /^[A-Z]{5}$/.test(word));
                
                TARGET_WORD = DICTIONARY[Math.floor(Math.random() * DICTIONARY.length)];
                
                // Remove loading message
                document.getElementById('message-container').innerHTML = '';
            } catch (error) {
                console.error(error);
                showMessage("Errore nel caricamento del dizionario. Riprova più tardi.", 0);
            }
        }
        const ROWS = 6;
        const COLS = 5;

        // Game State
        let currentR = 0;
        let currentC = 0;
        let isGameOver = false;
        let isAnimating = false;
        const board = [];

        // UI Initialization
        function initBoard() {
            const boardContainer = document.getElementById('board');
            for (let r = 0; r < ROWS; r++) {
                const rowObj = [];
                const rowElem = document.createElement('div');
                rowElem.classList.add('row');
                for (let c = 0; c < COLS; c++) {
                    const tileElem = document.createElement('div');
                    tileElem.classList.add('tile');
                    tileElem.dataset.state = 'tbd';
                    tileElem.id = `tile-${r}-${c}`;
                    rowElem.appendChild(tileElem);
                    rowObj.push(tileElem);
                }
                boardContainer.appendChild(rowElem);
                board.push(rowObj);
            }
        }

        function showMessage(msg, duration = 3000) {
            const container = document.getElementById('message-container');
            const msgEl = document.createElement('div');
            msgEl.textContent = msg;
            msgEl.classList.add('message');
            container.appendChild(msgEl);

            if (duration > 0) {
                setTimeout(() => {
                    msgEl.classList.add('fade-out');
                    setTimeout(() => msgEl.remove(), 500);
                }, duration);
            }
        }

        // Input Processing
        function handleInput(key) {
            if (isGameOver || isAnimating) return;

            key = key.toUpperCase();

            if (key === 'ENTER') {
                submitGuess();
            } else if (key === 'BACKSPACE') {
                deleteLetter();
            } else if (/^[A-Z]$/.test(key)) {
                addLetter(key);
            }
        }

        function addLetter(letter) {
            if (currentC < COLS) {
                const tile = board[currentR][currentC];
                tile.textContent = letter;
                tile.dataset.state = 'active';
                
                // Re-trigger the pop animation by cloning node
                const newTile = tile.cloneNode(true);
                tile.parentNode.replaceChild(newTile, tile);
                board[currentR][currentC] = newTile;

                currentC++;
            }
        }

        function deleteLetter() {
            if (currentC > 0) {
                currentC--;
                const tile = board[currentR][currentC];
                tile.textContent = '';
                tile.dataset.state = 'tbd';
                tile.style.animation = 'none'; // reset animation
            }
        }

        function submitGuess() {
            if (DICTIONARY.length === 0) {
                showMessage("Attendi il caricamento del dizionario...");
                return;
            }
            if (currentC !== COLS) {
                showMessage("Parola troppo corta");
                return;
            }

            // Construct word
            let guess = "";
            for (let c = 0; c < COLS; c++) {
                guess += board[currentR][c].textContent;
            }

            // Verify if word is valid Italian 5-letter word
            if (!/^[A-Z]{5}$/.test(guess)) {
                 showMessage("Caratteri non validi");
                 return;
            }

            if (!DICTIONARY.includes(guess)) {
                 showMessage("Parola non nel dizionario");
                 // animate shake could go here
                 return;
            }

            checkGuess(guess);
        }

        function checkGuess(guess) {
            isAnimating = true;

            const targetArray = TARGET_WORD.split('');
            const guessArray = guess.split('');
            const tileStatuses = new Array(COLS).fill('absent');

            // 1st pass: find exact matches (green)
            for (let i = 0; i < COLS; i++) {
                if (guessArray[i] === targetArray[i]) {
                    tileStatuses[i] = 'correct';
                    targetArray[i] = null; // Mark as used
                }
            }

            // 2nd pass: find partial matches (yellow)
            for (let i = 0; i < COLS; i++) {
                if (tileStatuses[i] !== 'correct' && targetArray.includes(guessArray[i])) {
                    tileStatuses[i] = 'present';
                    const indexToRemove = targetArray.indexOf(guessArray[i]);
                    targetArray[indexToRemove] = null; // Mark as used
                }
            }

            // Animate row
            const animationDuration = 500; // ms
            const stagger = 250; // ms

            for (let i = 0; i < COLS; i++) {
                const tile = board[currentR][i];
                const status = tileStatuses[i];
                const letter = guessArray[i];

                setTimeout(() => {
                    tile.style.animation = 'none';
                    tile.offsetHeight; /* trigger reflow */
                    
                    tile.style.animation = `flip-in ${animationDuration/2}ms ease-in forwards`;
                    
                    setTimeout(() => {
                        tile.classList.add(status);
                        tile.style.animation = `flip-out-${status} ${animationDuration/2}ms ease-out forwards`;
                        updateKeyboard(letter, status);
                    }, animationDuration / 2);

                    // End of row animation
                    if (i === COLS - 1) {
                        setTimeout(() => {
                            isAnimating = false;
                            
                            // Check win/lose conditions
                            if (guess === TARGET_WORD) {
                                isGameOver = true;
                                animateWinJump();
                                setTimeout(() => endGame(true), 1500);
                            } else if (currentR === ROWS - 1) {
                                isGameOver = true;
                                setTimeout(() => endGame(false), 1500);
                            } else {
                                currentR++;
                                currentC = 0;
                            }
                        }, animationDuration / 2);
                    }

                }, i * stagger);
            }
        }

        function updateKeyboard(letter, status) {
            const keyEl = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyEl) return;

            const currentStatus = keyEl.classList.contains('correct') ? 'correct' :
                                  keyEl.classList.contains('present') ? 'present' :
                                  keyEl.classList.contains('absent') ? 'absent' : 'tbd';

            // correct overrides present, present overrides absent
            if (status === 'correct' || (status === 'present' && currentStatus !== 'correct') || (status === 'absent' && currentStatus !== 'correct' && currentStatus !== 'present')) {
                keyEl.classList.remove('correct', 'present', 'absent');
                keyEl.classList.add(status);
            }
        }

        // Event Listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleInput('ENTER');
            } else if (e.key === 'Backspace') {
                handleInput('BACKSPACE');
            } else if (/^[a-zA-Z]$/.test(e.key)) {
                handleInput(e.key.toUpperCase());
            }
        });

        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                handleInput(key.dataset.key);
            });
        });

        // Animations and Endgame logic
        let stats = JSON.parse(sessionStorage.getItem('wordleStats')) || { played: 0, won: 0 };

        function animateWinJump() {
            for (let i = 0; i < COLS; i++) {
                const tile = board[currentR][i];
                setTimeout(() => {
                    tile.classList.add('jump');
                }, i * 100);
            }
        }

        function endGame(won) {
            stats.played++;
            if (won) stats.won++;
            sessionStorage.setItem('wordleStats', JSON.stringify(stats));
            
            document.getElementById('stat-played').textContent = stats.played;
            document.getElementById('stat-won').textContent = stats.won;
            
            let winPct = stats.played === 0 ? 0 : Math.round((stats.won / stats.played) * 100);
            document.getElementById('stat-winpct').textContent = winPct + '%';
            
            // Generate mini board
            let miniBoardHTML = '';
            for (let r = 0; r <= currentR; r++) {
                let rowStr = '';
                for (let c = 0; c < COLS; c++) {
                    const status = board[r][c].classList.contains('correct') ? '🟩' :
                                   board[r][c].classList.contains('present') ? '🟨' : '⬛';
                    rowStr += status;
                }
                miniBoardHTML += `<div class="mini-board-line">${rowStr}</div>`;
            }
            document.getElementById('mini-board-container').innerHTML = miniBoardHTML;
            
            document.getElementById('modal-title').textContent = won ? "Hai Vinto! 🎉" : "Sconfitta 😢";
            document.getElementById('modal-subtitle').textContent = won ? `Tentativo ${currentR + 1} di ${ROWS}` : `La parola era: ${TARGET_WORD}`;
            document.getElementById('message-container').innerHTML = ''; // clear messages
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function resetGame() {
            document.getElementById('modal-overlay').style.display = 'none';
            // Clear board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = board[r][c];
                    tile.textContent = '';
                    tile.dataset.state = 'tbd';
                    tile.className = 'tile';
                    tile.style.animation = 'none';
                }
            }
            // Clear keys
            document.querySelectorAll('.key').forEach(key => {
                key.classList.remove('correct', 'present', 'absent');
            });
            
            currentR = 0;
            currentC = 0;
            isGameOver = false;
            TARGET_WORD = DICTIONARY[Math.floor(Math.random() * DICTIONARY.length)];
        }

        // Start
        initBoard();
        loadDictionary();

    </script>
</body>
</html>
