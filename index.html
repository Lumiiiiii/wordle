<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordle IT — Indovina la Parola</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0f0f0f;
            --color-bg-header: #1a1a2e;
            --color-text: #eaeaea;
            --color-correct: #538d4e;
            --color-correct-glow: rgba(83, 141, 78, 0.5);
            --color-present: #b59f3b;
            --color-present-glow: rgba(181, 159, 59, 0.5);
            --color-absent: #3a3a3c;
            --color-key-bg: #818384;
            --color-border: rgba(255, 255, 255, 0.15);
            --color-border-active: rgba(255, 255, 255, 0.6);
            --color-surface: #1e1e1e;
            --color-accent: #6c63ff;
            --color-accent-glow: rgba(108, 99, 255, 0.4);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --radius-tile: 6px;
            --radius-key: 6px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            touch-action: pan-y;
        }

        header {
            width: 100%;
            padding: 10px 0 8px;
            text-align: center;
            background: var(--color-bg-header);
            z-index: 10;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .ad-banner {
            width: 100%;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-banner span {
            font-size: 9px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 {
            margin: 6px 0 4px;
            font-size: 28px;
            letter-spacing: 6px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c63ff, #e040fb, #ff5252);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        #streak-container {
            font-size: 1rem;
            color: var(--color-present);
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            height: 1em;
            vertical-align: -0.125em;
            flex-shrink: 0;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .icon-flame {
            color: #e8590c;
        }

        .icon-trophy {
            color: #f5c542;
        }

        .icon-user {
            color: #888;
        }

        .nickname-display:hover .icon-user {
            color: var(--color-accent);
        }

        .btn-top10 {
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 10px var(--color-accent-glow);
        }

        .btn-top10:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--color-accent-glow);
        }

        .btn-top10:active {
            transform: translateY(1px);
        }

        .nickname-display {
            font-size: 0.8rem;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nickname-display:hover {
            color: var(--color-accent);
        }

        /* Message Box Container */
        #message-container {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            width: 90%;
        }

        .message {
            background-color: rgba(255, 255, 255, 0.95);
            color: #121213;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 700;
            margin-bottom: 10px;
            opacity: 1;
            transition: opacity 0.5s ease-out, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
            transform: translateY(0);
            pointer-events: auto;
            font-size: 0.95rem;
        }

        .message.fade-out {
            opacity: 0;
            transform: translateY(-20px);
        }

        /* Board */
        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 8px;
            width: 100%;
            overflow: hidden;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 8px;
            width: 100%;
            max-width: min(360px, 92%, calc((100dvh - 340px) * 5 / 6));
            aspect-ratio: 5 / 6;
            margin: 0 auto;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 100%;
            height: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 700;
            vertical-align: middle;
            color: var(--color-text);
            text-transform: uppercase;
            border: 2px solid var(--color-border);
            user-select: none;
            border-radius: var(--radius-tile);
            background-color: transparent;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }

        .tile[data-state="tbd"] {
            border: 2px solid var(--color-border);
        }

        .tile[data-state="active"] {
            border-color: var(--color-border-active);
            transform: scale(1.03);
            animation: pop 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Flip Animation */
        @keyframes flip-in {
            0% {
                transform: rotateX(0deg) scale(1.02);
            }

            50% {
                transform: rotateX(-90deg) scale(1.04);
            }

            100% {
                transform: rotateX(-90deg) scale(1.04);
            }
        }

        @keyframes flip-out-correct {
            0% {
                transform: rotateX(-90deg) scale(1.04);
                background-color: var(--color-correct);
                border-color: transparent;
            }

            100% {
                transform: rotateX(0deg) scale(1);
                background-color: var(--color-correct);
                border-color: transparent;
                box-shadow: 0 0 12px var(--color-correct-glow);
            }
        }

        @keyframes flip-out-present {
            0% {
                transform: rotateX(-90deg) scale(1.04);
                background-color: var(--color-present);
                border-color: transparent;
            }

            100% {
                transform: rotateX(0deg) scale(1);
                background-color: var(--color-present);
                border-color: transparent;
                box-shadow: 0 0 12px var(--color-present-glow);
            }
        }

        @keyframes flip-out-absent {
            0% {
                transform: rotateX(-90deg) scale(1.04);
                background-color: var(--color-absent);
                border-color: transparent;
            }

            100% {
                transform: rotateX(0deg) scale(1);
                background-color: var(--color-absent);
                border-color: transparent;
            }
        }

        /* Keyboard */
        #keyboard {
            width: 100%;
            max-width: 500px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: max(6px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .key {
            font-family: inherit;
            font-weight: 600;
            border: 0;
            padding: 0;
            margin: 0;
            height: clamp(42px, 6.5vh, 52px);
            border-radius: var(--radius-key);
            cursor: pointer;
            user-select: none;
            background-color: var(--color-key-bg);
            color: #fff;
            flex: 1;
            max-width: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            font-size: clamp(0.9rem, 3.5vw, 1.15rem);
            transition: all 0.1s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 2px 0 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .key::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.12);
            opacity: 0;
            transition: opacity 0.12s;
        }

        .key:active::after {
            opacity: 1;
        }

        .key:active {
            transform: translateY(2px) scale(0.97);
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.3);
        }

        .key.large {
            flex: 1.5;
            max-width: 65px;
            font-size: clamp(0.75rem, 2.8vw, 0.95rem);
        }

        /* Post-flip states */
        .tile.correct,
        .key.correct {
            background-color: var(--color-correct) !important;
            border-color: transparent !important;
            color: white;
            box-shadow: 0 0 12px var(--color-correct-glow);
        }

        .tile.present,
        .key.present {
            background-color: var(--color-present) !important;
            border-color: transparent !important;
            color: white;
            box-shadow: 0 0 12px var(--color-present-glow);
        }

        .tile.absent,
        .key.absent {
            background-color: var(--color-absent) !important;
            border-color: transparent !important;
            color: white;
            box-shadow: none !important;
        }

        .key.correct,
        .key.present,
        .key.absent {
            box-shadow: 0 2px 0 0 rgba(0, 0, 0, 0.4) !important;
        }

        /* Pop animation */
        @keyframes pop {
            0% {
                transform: scale(0.85);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1.03);
                opacity: 1;
            }
        }

        .tile.pop {
            animation: pop 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Victory Jump */
        @keyframes jump {

            0%,
            20% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-22px) scale(1.06);
            }

            50% {
                transform: translateY(4px) scale(0.95);
            }

            60% {
                transform: translateY(-10px) scale(1.02);
            }

            80% {
                transform: translateY(2px) scale(0.99);
            }

            100% {
                transform: translateY(0);
            }
        }

        .tile.jump {
            animation: jump 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Modal Overlay */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #modal-content {
            background: linear-gradient(160deg, #1c1c2e, #1a1a1a);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: 20px;
            padding: 35px 28px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px var(--color-accent-glow);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #modal-title {
            margin-top: 0;
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #modal-subtitle {
            color: #999;
            font-size: 1rem;
            margin-bottom: 18px;
            font-weight: 600;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 18px 10px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        #mini-board-container {
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mini-board-line {
            line-height: 1.1;
            letter-spacing: 4px;
            margin-bottom: 3px;
            font-size: 1.3rem;
        }

        button#play-again {
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--color-accent-glow);
            letter-spacing: 1px;
            font-family: inherit;
        }

        button#play-again:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--color-accent-glow);
        }

        button#play-again:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px var(--color-accent-glow);
        }

        /* Leaderboard overlay */
        #leaderboard-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .leaderboard-card {
            background: linear-gradient(160deg, #1c1c2e, #1a1a1a);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(108, 99, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 30px var(--color-accent-glow);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .leaderboard-card h2 {
            margin-top: 0;
            color: var(--color-present);
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        #leaderboard-list {
            margin: 20px 0;
            text-align: left;
            font-size: 1rem;
        }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 4px;
            transition: background 0.2s;
        }

        .lb-entry:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .lb-rank {
            color: #888;
            min-width: 28px;
        }

        .lb-rank.gold {
            color: #ffd700;
        }

        .lb-rank.silver {
            color: #c0c0c0;
        }

        .lb-rank.bronze {
            color: #cd7f32;
        }

        .lb-name {
            flex: 1;
            font-weight: 600;
        }

        .lb-score {
            color: var(--color-correct);
            font-weight: 700;
        }

        .btn-close-lb {
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px var(--color-accent-glow);
        }

        .btn-close-lb:hover {
            transform: translateY(-1px);
        }

        .btn-close-lb:active {
            transform: translateY(1px);
        }

        /* Nickname modal */
        #nickname-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 250;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .nickname-card {
            background: linear-gradient(160deg, #1c1c2e, #1a1a1a);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(108, 99, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 30px var(--color-accent-glow);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nickname-card h2 {
            margin-top: 0;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nickname-card p {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .nickname-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(108, 99, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #eee;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        .nickname-input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 15px var(--color-accent-glow);
        }

        .nickname-input::placeholder {
            color: #555;
        }

        .btn-confirm-nick {
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px var(--color-accent-glow);
        }

        .btn-confirm-nick:hover {
            transform: translateY(-1px);
        }

        .btn-confirm-nick:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>

    <header>
        <div class="ad-banner">
            <span>Pubblicità</span>
        </div>
        <h1>WORDLE IT</h1>
        <div class="header-bar">
            <div id="streak-container">
                STREAK: <span id="current-streak">0</span>
                <span class="icon icon-flame"><svg viewBox="0 0 24 24"><path d="M12 23c-3.6 0-8-2.4-8-7.7 0-4 3.1-7.3 5.1-9.3.4-.4 1.1-.2 1.2.3.3 1.5.9 3 2.2 4.1.1-.8.3-2 .7-3.1C14.2 4.4 13 2.1 12.5 1.3c-.2-.4.1-.9.6-.9 3.1.3 7.9 4.2 7.9 10.3 0 5.2-4.4 7.7-8 7.7 0 0-1-.1-1.6-.5-.5-.3-.3-1.1.3-1.1 1.1 0 2.5-.8 3-2.5.1-.4-.1-.8-.4-1-1.1-.7-2.1-1.9-2.5-3.5-.1-.3-.4-.4-.7-.2C9 11.2 7 13.5 7 15.4c0 3.2 2.7 4.6 5 4.6 2.9 0 5-1.8 5-4.7 0-3.7-2.9-7-5.3-8.5-.2.7-.3 1.5-.3 2.2 0 .4-.4.6-.7.4C8.5 8 7.7 5.7 7.5 4.3c-.1-.3-.3-.4-.6-.2C5.1 5.5 4 8 4 10.8 4 15 6.7 20 12 20c3 0 5-2.2 5-4.7 0 0 .2 4.7-5 7.7z"/></svg></span>
            </div>
            <button class="btn-top10" onclick="mostraClassifica()"><span class="icon icon-trophy"><svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.6 1.9 4.7 4.4 5.1.7 1.2 1.8 2.1 3.1 2.5V19H7v2h10v-2h-3.5v-3.4c1.3-.4 2.4-1.3 3.1-2.5C19.1 12.7 21 10.6 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.9C5.8 10.4 5 9.3 5 8zm14 0c0 1.3-.8 2.4-2 2.9V7h2v1z"/></svg></span> TOP 10</button>
            <span id="nickname-display" class="nickname-display" onclick="cambiaNickname()"
                title="Clicca per cambiare nickname"></span>
        </div>
    </header>

    <div id="message-container"></div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row">
            <div style="flex: 0.5;"></div>
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
            <div style="flex: 0.5;"></div>
        </div>
        <div class="keyboard-row">
            <button class="key large" data-key="ENTER">INVIO</button>
            <button class="key" data-key="Z">Z</button>
            <button class="key" data-key="X">X</button>
            <button class="key" data-key="C">C</button>
            <button class="key" data-key="V">V</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="N">N</button>
            <button class="key" data-key="M">M</button>
            <button class="key large" data-key="BACKSPACE">⌫</button>
        </div>
    </div>

    <!-- Modal for Endgame screen -->
    <div id="modal-overlay">
        <div id="modal-content">
            <h2 id="modal-title">Risultati</h2>
            <div id="modal-subtitle"></div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-num" id="stat-played">0</div>
                    <div class="stat-label">Giocate</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-won">0</div>
                    <div class="stat-label">Vinte</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="stat-winpct">0%</div>
                    <div class="stat-label">Win %</div>
                </div>
            </div>

            <div id="mini-board-container"></div>

            <button id="play-again" onclick="resetGame()">GIOCA ANCORA</button>
        </div>
    </div>

    <!-- Leaderboard overlay -->
    <div id="leaderboard-overlay">
        <div class="leaderboard-card">
            <h2><span class="icon icon-trophy" style="font-size:1.3em"><svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.6 1.9 4.7 4.4 5.1.7 1.2 1.8 2.1 3.1 2.5V19H7v2h10v-2h-3.5v-3.4c1.3-.4 2.4-1.3 3.1-2.5C19.1 12.7 21 10.6 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.9C5.8 10.4 5 9.3 5 8zm14 0c0 1.3-.8 2.4-2 2.9V7h2v1z"/></svg></span> TOP 10 GLOBALE</h2>
            <div id="leaderboard-list">
                Caricamento...
            </div>
            <button class="btn-close-lb" onclick="chiudiClassifica()">CHIUDI</button>
        </div>
    </div>

    <!-- Nickname modal -->
    <div id="nickname-overlay">
        <div class="nickname-card">
            <h2>Benvenuto!</h2>
            <p>Scegli un nickname per la classifica globale. Potrai cambiarlo in seguito.</p>
            <input type="text" id="nickname-input" class="nickname-input" placeholder="Il tuo nickname..."
                maxlength="20" autocomplete="off">
            <button class="btn-confirm-nick" onclick="confermaNickname()">CONFERMA</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configurazione Supabase
        const SUPABASE_URL = 'https://nejuxfvknaklivnobhht.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_e1No0FOt7NRiofrp2sEq8g_eVOKPq3n';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Nickname persistente
        let playerNickname = localStorage.getItem('wordle_nickname') || '';
        let currentStreak = parseInt(localStorage.getItem('wordle_streak')) || 0;
        document.getElementById('current-streak').textContent = currentStreak;
        updateNicknameDisplay();

        let DICTIONARY = [];
        let TARGET_WORD = "";

        function updateNicknameDisplay() {
            const el = document.getElementById('nickname-display');
            const userIcon = '<span class="icon icon-user"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg></span> ';
            if (playerNickname) {
                el.innerHTML = userIcon + playerNickname;
                el.title = 'Clicca per cambiare nickname';
            } else {
                el.innerHTML = userIcon + 'Imposta nickname';
                el.title = 'Clicca per impostare il nickname';
            }
        }

        // Chiedi nickname se non esiste ancora (all'avvio)
        function chiediNicknamSeNecessario() {
            if (!playerNickname) {
                document.getElementById('nickname-overlay').style.display = 'flex';
                document.getElementById('nickname-input').focus();
            }
        }

        function confermaNickname() {
            const input = document.getElementById('nickname-input');
            const nome = input.value.trim();
            if (nome.length < 2) {
                input.style.borderColor = '#ff5252';
                input.placeholder = 'Minimo 2 caratteri!';
                return;
            }
            playerNickname = nome;
            localStorage.setItem('wordle_nickname', playerNickname);
            document.getElementById('nickname-overlay').style.display = 'none';
            updateNicknameDisplay();
        }

        function cambiaNickname() {
            document.getElementById('nickname-input').value = playerNickname;
            document.getElementById('nickname-overlay').style.display = 'flex';
            document.getElementById('nickname-input').focus();
        }

        // Permetti invio con Enter nel campo nickname
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nickname-input').addEventListener('keydown', (e) => {
                e.stopPropagation(); // Previeni che il gioco catturi il tasto
                if (e.key === 'Enter') confermaNickname();
            });
        });

        // Fetch dictionary
        async function loadDictionary() {
            showMessage("Caricamento dizionario...", 0);
            try {
                const response = await fetch("https://raw.githubusercontent.com/napolux/paroleitaliane/master/paroleitaliane/660000_parole_italiane.txt");
                if (!response.ok) throw new Error("Errore di rete");
                const text = await response.text();

                DICTIONARY = text.split('\n')
                    .map(word => word.trim().toUpperCase())
                    .filter(word => word.length === 5 && /^[A-Z]{5}$/.test(word));

                TARGET_WORD = DICTIONARY[Math.floor(Math.random() * DICTIONARY.length)];
                document.getElementById('message-container').innerHTML = '';

                // Dopo il caricamento, chiedi nickname se mancante
                chiediNicknamSeNecessario();
            } catch (error) {
                console.error(error);
                showMessage("Errore nel caricamento del dizionario. Riprova più tardi.", 0);
            }
        }

        const ROWS = 6;
        const COLS = 5;

        // Game State
        let currentR = 0;
        let currentC = 0;
        let isGameOver = false;
        let isAnimating = false;
        const board = [];

        // UI Initialization
        function initBoard() {
            const boardContainer = document.getElementById('board');
            for (let r = 0; r < ROWS; r++) {
                const rowObj = [];
                const rowElem = document.createElement('div');
                rowElem.classList.add('row');
                for (let c = 0; c < COLS; c++) {
                    const tileElem = document.createElement('div');
                    tileElem.classList.add('tile');
                    tileElem.dataset.state = 'tbd';
                    tileElem.id = `tile-${r}-${c}`;
                    rowElem.appendChild(tileElem);
                    rowObj.push(tileElem);
                }
                boardContainer.appendChild(rowElem);
                board.push(rowObj);
            }
        }

        function showMessage(msg, duration = 3000) {
            const container = document.getElementById('message-container');
            const msgEl = document.createElement('div');
            msgEl.textContent = msg;
            msgEl.classList.add('message');
            container.appendChild(msgEl);

            if (duration > 0) {
                setTimeout(() => {
                    msgEl.classList.add('fade-out');
                    setTimeout(() => msgEl.remove(), 500);
                }, duration);
            }
        }

        // Input Processing
        function handleInput(key) {
            if (isGameOver || isAnimating) return;
            // Non gestire input se il modal nickname è aperto
            if (document.getElementById('nickname-overlay').style.display === 'flex') return;

            key = key.toUpperCase();

            if (key === 'ENTER') {
                submitGuess();
            } else if (key === 'BACKSPACE') {
                deleteLetter();
            } else if (/^[A-Z]$/.test(key)) {
                addLetter(key);
            }
        }

        function addLetter(letter) {
            if (currentC < COLS) {
                const tile = board[currentR][currentC];
                tile.textContent = letter;
                tile.dataset.state = 'active';

                const newTile = tile.cloneNode(true);
                tile.parentNode.replaceChild(newTile, tile);
                board[currentR][currentC] = newTile;

                currentC++;
            }
        }

        function deleteLetter() {
            if (currentC > 0) {
                currentC--;
                const tile = board[currentR][currentC];
                tile.textContent = '';
                tile.dataset.state = 'tbd';
                tile.style.animation = 'none';
            }
        }

        function submitGuess() {
            if (DICTIONARY.length === 0) {
                showMessage("Attendi il caricamento del dizionario...");
                return;
            }
            if (currentC !== COLS) {
                showMessage("Parola troppo corta");
                return;
            }

            let guess = "";
            for (let c = 0; c < COLS; c++) {
                guess += board[currentR][c].textContent;
            }

            if (!/^[A-Z]{5}$/.test(guess)) {
                showMessage("Caratteri non validi");
                return;
            }

            if (!DICTIONARY.includes(guess)) {
                showMessage("Parola non nel dizionario");
                return;
            }

            checkGuess(guess);
        }

        function checkGuess(guess) {
            isAnimating = true;

            const targetArray = TARGET_WORD.split('');
            const guessArray = guess.split('');
            const tileStatuses = new Array(COLS).fill('absent');

            for (let i = 0; i < COLS; i++) {
                if (guessArray[i] === targetArray[i]) {
                    tileStatuses[i] = 'correct';
                    targetArray[i] = null;
                }
            }

            for (let i = 0; i < COLS; i++) {
                if (tileStatuses[i] !== 'correct' && targetArray.includes(guessArray[i])) {
                    tileStatuses[i] = 'present';
                    const indexToRemove = targetArray.indexOf(guessArray[i]);
                    targetArray[indexToRemove] = null;
                }
            }

            const animationDuration = 500;
            const stagger = 250;

            for (let i = 0; i < COLS; i++) {
                const tile = board[currentR][i];
                const status = tileStatuses[i];
                const letter = guessArray[i];

                setTimeout(() => {
                    tile.style.animation = 'none';
                    tile.offsetHeight;

                    tile.style.animation = `flip-in ${animationDuration / 2}ms ease-in forwards`;

                    setTimeout(() => {
                        tile.classList.add(status);
                        tile.style.animation = `flip-out-${status} ${animationDuration / 2}ms ease-out forwards`;
                        updateKeyboard(letter, status);
                    }, animationDuration / 2);

                    if (i === COLS - 1) {
                        setTimeout(() => {
                            isAnimating = false;

                            if (guess === TARGET_WORD) {
                                isGameOver = true;
                                animateWinJump();
                                setTimeout(() => endGame(true), 1500);
                            } else if (currentR === ROWS - 1) {
                                isGameOver = true;
                                setTimeout(() => endGame(false), 1500);
                            } else {
                                currentR++;
                                currentC = 0;
                            }
                        }, animationDuration / 2);
                    }

                }, i * stagger);
            }
        }

        function updateKeyboard(letter, status) {
            const keyEl = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyEl) return;

            const currentStatus = keyEl.classList.contains('correct') ? 'correct' :
                keyEl.classList.contains('present') ? 'present' :
                    keyEl.classList.contains('absent') ? 'absent' : 'tbd';

            if (status === 'correct' || (status === 'present' && currentStatus !== 'correct') || (status === 'absent' && currentStatus !== 'correct' && currentStatus !== 'present')) {
                keyEl.classList.remove('correct', 'present', 'absent');
                keyEl.classList.add(status);
            }
        }

        // Event Listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleInput('ENTER');
            } else if (e.key === 'Backspace') {
                handleInput('BACKSPACE');
            } else if (/^[a-zA-Z]$/.test(e.key)) {
                handleInput(e.key.toUpperCase());
            }
        });

        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                handleInput(key.dataset.key);
            });
        });

        // Animations and Endgame logic
        let stats = JSON.parse(sessionStorage.getItem('wordleStats')) || { played: 0, won: 0 };

        function animateWinJump() {
            for (let i = 0; i < COLS; i++) {
                const tile = board[currentR][i];
                setTimeout(() => {
                    tile.classList.add('jump');
                }, i * 100);
            }
        }

        // Upsert: aggiorna la streak se il nickname esiste già, altrimenti inserisci nuovo record
        async function inviaPunteggio(nome, punteggio) {
            try {
                // Prima controlla se esiste già un record per questo username
                const { data: existing, error: fetchError } = await _supabase
                    .from('classifica')
                    .select('id, streak')
                    .eq('username', nome)
                    .limit(1);

                if (fetchError) {
                    console.error("Errore nel controllo duplicati:", fetchError);
                    return;
                }

                if (existing && existing.length > 0) {
                    // Aggiorna solo se la nuova streak è più alta
                    if (punteggio > existing[0].streak) {
                        const { error: updateError } = await _supabase
                            .from('classifica')
                            .update({ streak: punteggio })
                            .eq('id', existing[0].id);

                        if (updateError) {
                            console.error("Errore nell'aggiornamento:", updateError);
                        } else {
                            console.log("Streak aggiornata in classifica!");
                        }
                    } else {
                        console.log("La streak attuale non supera il record personale.");
                    }
                } else {
                    // Inserisci nuovo record
                    const { error: insertError } = await _supabase
                        .from('classifica')
                        .insert([{ username: nome, streak: punteggio }]);

                    if (insertError) {
                        console.error("Errore di salvataggio:", insertError);
                    } else {
                        console.log("Nuovo record salvato in classifica!");
                    }
                }
            } catch (err) {
                console.error("Errore generico:", err);
            }
        }

        function endGame(won) {
            stats.played++;
            if (won) {
                stats.won++;
                currentStreak++;

                // Invia automaticamente il punteggio usando il nickname salvato
                if (playerNickname) {
                    inviaPunteggio(playerNickname, currentStreak);
                }
            } else {
                currentStreak = 0;
            }

            localStorage.setItem('wordle_streak', currentStreak);
            document.getElementById('current-streak').textContent = currentStreak;

            sessionStorage.setItem('wordleStats', JSON.stringify(stats));

            document.getElementById('stat-played').textContent = stats.played;
            document.getElementById('stat-won').textContent = stats.won;

            let winPct = stats.played === 0 ? 0 : Math.round((stats.won / stats.played) * 100);
            document.getElementById('stat-winpct').textContent = winPct + '%';

            // Generate mini board
            let miniBoardHTML = '';
            for (let r = 0; r <= currentR; r++) {
                let rowStr = '';
                for (let c = 0; c < COLS; c++) {
                    const status = board[r][c].classList.contains('correct') ? '🟩' :
                        board[r][c].classList.contains('present') ? '🟨' : '⬛';
                    rowStr += status;
                }
                miniBoardHTML += `<div class="mini-board-line">${rowStr}</div>`;
            }
            document.getElementById('mini-board-container').innerHTML = miniBoardHTML;

            document.getElementById('modal-title').textContent = won ? "Hai Vinto! 🎉" : "Sconfitta 😢";
            document.getElementById('modal-subtitle').textContent = won ? `Tentativo ${currentR + 1} di ${ROWS}` : `La parola era: ${TARGET_WORD}`;
            document.getElementById('message-container').innerHTML = '';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function resetGame() {
            document.getElementById('modal-overlay').style.display = 'none';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = board[r][c];
                    tile.textContent = '';
                    tile.dataset.state = 'tbd';
                    tile.className = 'tile';
                    tile.style.animation = 'none';
                }
            }
            document.querySelectorAll('.key').forEach(key => {
                key.classList.remove('correct', 'present', 'absent');
            });

            currentR = 0;
            currentC = 0;
            isGameOver = false;
            TARGET_WORD = DICTIONARY[Math.floor(Math.random() * DICTIONARY.length)];
        }

        async function mostraClassifica() {
            const overlay = document.getElementById('leaderboard-overlay');
            const list = document.getElementById('leaderboard-list');
            overlay.style.display = 'flex';
            list.innerHTML = "Caricamento...";

            const { data, error } = await _supabase
                .from('classifica')
                .select('username, streak')
                .order('streak', { ascending: false })
                .limit(10);

            if (error) {
                list.innerHTML = "<p style='text-align:center; color:#888;'>Errore nel caricamento.</p>";
                console.error(error);
            } else if (!data || data.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#888;'>Nessun punteggio ancora. Sii il primo!</p>";
            } else {
                list.innerHTML = data.map((player, index) => {
                    const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                    const isMe = player.username === playerNickname;
                    return `
                        <div class="lb-entry" ${isMe ? 'style="background: rgba(108, 99, 255, 0.1);"' : ''}>
                            <span class="lb-rank ${rankClass}">${medal}</span>
                            <span class="lb-name">${player.username}${isMe ? ' (tu)' : ''}</span>
                            <span class="lb-score">${player.streak} 🔥</span>
                        </div>
                    `;
                }).join('');
            }
        }

        function chiudiClassifica() {
            document.getElementById('leaderboard-overlay').style.display = 'none';
        }

        // Start
        initBoard();
        loadDictionary();

    </script>
</body>

</html>
